<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Borrachón - Tienda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="tienda-body"> <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark-custom">
            <div class="container-fluid px-4">
                <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                    <span style="font-size: 1.6rem;">🍻</span>
                    <span class="logo-text">El Borrachón</span>
                </a>
            
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navBarBorrachon" aria-controls="navBarBorrachon" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            
                <div class="collapse navbar-collapse" id="navBarBorrachon">
                    <div class="navbar-nav me-auto mb-2 mb-lg-0">
                        <span class="nav-link user-welcome-text" id="welcome-msg">Hola, usuario</span>
                    </div>
                
                    <div class="d-flex align-items-center gap-2 flex-column flex-lg-row w-100 w-lg-auto">
                        <form class="d-flex w-100" role="search" onsubmit="event.preventDefault();">
                            <input class="form-control search-nav-input" type="search" id="search-input" placeholder="Buscar bebida..." aria-label="Search">
                        </form>
                        <button id="logout-btn" class="btn btn-logout-custom w-100 w-lg-auto">Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-3">
        <div id="carouselExampleFade" class="carousel slide carousel-fade mb-4">
            <div class="carousel-inner" id="carousel-dynamic-inner"></div>
            <button class="carousel-control-prev" type="button" id="carousel-prev-btn">
                <span class="carousel-control-prev-icon-custom" aria-hidden="true"></span>
                <span class="visually-hidden">Anterior</span>
            </button>
            <button class="carousel-control-next" type="button" id="carousel-next-btn">
                <span class="carousel-control-next-icon-custom" aria-hidden="true"></span>
                <span class="visually-hidden">Siguiente</span>
            </button>
        </div>

        <section id="admin-panel" class="admin-section mb-4 hidden">
            <h3 class="mb-2 section-title">Panel de Administración</h3>
            <form id="product-form" class="admin-form">
                <input type="hidden" id="product-id">
                <div class="form-row">
                    <input type="text" id="prod-name" placeholder="Nombre" required>
                    <input type="number" id="prod-price" step="0.01" placeholder="Precio (RD$)" required>
                    <input type="url" id="prod-img" placeholder="URL Imagen" required>
                    
                    <select id="prod-category" class="form-select-custom" required>
                        <option value="" disabled selected>Categoría...</option>
                        <option value="Cerveza">Cerveza</option>
                        <option value="Ron">Ron</option>
                        <option value="Whisky">Whisky</option>
                        <option value="Vodka">Vodka</option>
                        <option value="Tequila">Tequila</option>
                        <option value="Otros">Otros</option>
                    </select>

                    <button type="submit" class="btn btn-save" id="form-submit-btn">Guardar</button>
                </div>
            </form>
        </section>

        <section class="catalog-section">
            <h3 class="mb-3 section-title">Nuestro Catálogo</h3>
        
            <div class="row g-4">
                <div class="col-12 col-md-3">
                    <div id="category-filter-list" class="list-group list-group-custom sticky-top" style="top: 20px; z-index: 10;">
                        <a class="list-group-item list-group-item-action active" href="#cat-todas">✨ Todas las Bebidas</a>
                        <a class="list-group-item list-group-item-action" href="#cat-cerveza">🍺 Cervezas</a>
                        <a class="list-group-item list-group-item-action" href="#cat-ron">🥃 Rones</a>
                        <a class="list-group-item list-group-item-action" href="#cat-whisky">🥃 Whiskies</a>
                        <a class="list-group-item list-group-item-action" href="#cat-vodka">🍸 Vodkas</a>
                        <a class="list-group-item list-group-item-action" href="#cat-tequila">🌵 Tequilas</a>
                        <a class="list-group-item list-group-item-action" href="#cat-otros">🍾 Otros</a>
                    </div>
                </div>

                <div class="col-12 col-md-9">
                    <div id="scrollspy-container" data-bs-spy="scroll" data-bs-target="#category-filter-list" data-bs-offset="15" data-bs-smooth-scroll="true" class="scrollspy-products-container" tabindex="0">
                        
                        <div id="cat-todas" class="category-block mb-5">
                            <h4 class="category-block-title">✨ Todas las Bebidas</h4>
                            <div id="grid-todas" class="products-grid"></div>
                        </div>

                        <div id="cat-cerveza" class="category-block mb-5">
                            <h4 class="category-block-title">🍺 Cervezas</h4>
                            <div id="grid-cerveza" class="products-grid"></div>
                        </div>

                        <div id="cat-ron" class="category-block mb-5">
                            <h4 class="category-block-title">🥃 Rones</h4>
                            <div id="grid-ron" class="products-grid"></div>
                        </div>

                        <div id="cat-whisky" class="category-block mb-5">
                            <h4 class="category-block-title">🥃 Whiskies</h4>
                            <div id="grid-whisky" class="products-grid"></div>
                        </div>

                        <div id="cat-vodka" class="category-block mb-5">
                            <h4 class="category-block-title">🍸 Vodkas</h4>
                            <div id="grid-vodka" class="products-grid"></div>
                        </div>

                        <div id="cat-tequila" class="category-block mb-5">
                            <h4 class="category-block-title">🌵 Tequilas</h4>
                            <div id="grid-tequila" class="products-grid"></div>
                        </div>

                        <div id="cat-otros" class="category-block mb-5">
                            <h4 class="category-block-title">🍾 Otros</h4>
                            <div id="grid-otros" class="products-grid"></div>
                        </div>

                    </div>
                </div>
            </div>
        </section>

        <section id="client-panel" class="cart-section mt-4 hidden">
            <h3 class="mb-2 section-title-cart">🛍️ Tu Carrito</h3>
            <div id="cart-items" class="mb-2"></div>
            <div class="d-flex justify-content-between align-items-center pt-2" style="border-top: 1px solid rgba(255,255,255,0.1);">
                <h5 class="m-0">Total: <span class="total-price-text">RD$ <span id="cart-total-val">0.00</span></span></h5>
                <button id="checkout-btn" class="btn btn-checkout">Finalizar Compra</button>
            </div>
        </section>
    </main>

    <div id="details-modal" class="modal hidden">
        <div id="details-modal-content"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
