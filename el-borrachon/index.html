<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Borrachón - Inicio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="landing-nav">
        <div class="nav-container">
            <a href="#" class="nav-logo">Start El Borrachón</a>
            <div class="nav-links">
                <a href="#about" onclick="alert('Sobre Nosotros: Somos la mejor licorería de la zona.')">About</a>
                <a href="#projects" onclick="alert('Proyectos: Próximamente entregas a domicilio con drones.')">Projects</a>
                <a href="#contact" onclick="alert('Contacto: Soporte 24/7 vía WhatsApp.')">Contact</a>
                <button class="btn-nav-login" id="show-login-btn">Ingresar</button>
            </div>
        </div>
    </nav>

    <header class="hero-section">
        <div class="hero-overlay"></div> 
        <div class="hero-content">
            <h1 class="hero-title">EL BORRACHÓN</h1>
            <p class="hero-subtitle">Una amplia variedad de bebidas nacionales e internacionales a un solo clic.</p>
            <button class="btn-get-started" id="get-started-btn">GET STARTED</button>
        </div>
    </header>

    <div id="login-modal" class="modal hidden">
        <div class="login-container">
            <span class="close-modal" id="close-modal-btn">&times;</span>
            <h2>🍻 Iniciar Sesión 🍻</h2>
            <p>Introduce tus credenciales para ingresar</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" required placeholder="ejemplo@correo.com">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" required placeholder="******">
                </div>
                <button type="submit" class="btn">Ingresar</button>
            </form>
            
            <div class="test-credentials">
                <p><strong>Cuentas de prueba:</strong></p>
                <p>Admin: <code>admin@borrachon.com</code> / <code>admin123</code></p>
                <p>Cliente: <code>cliente@correo.com</code> / <code>user123</code></p>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
