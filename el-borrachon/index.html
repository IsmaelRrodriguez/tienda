<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Borrachón - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <h2>🍻 El Borrachón 🍻</h2>
        <p>Introduce tus credenciales para ingresar</p>
        
        <form id="login-form">
            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" required placeholder="ejemplo@correo.com">
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" required placeholder="******">
            </div>
            <button type="submit" class="btn">Ingresar</button>
        </form>
        
        <div class="test-credentials">
            <p><strong>Cuentas de prueba:</strong></p>
            <p>Admin: <code>admin@borrachon.com</code> / <code>admin123</code></p>
            <p>Cliente: <code>cliente@correo.com</code> / <code>user123</code></p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
